services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: backend/.env
        required: false
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_BASE: http://api:8000
    depends_on:
      - api
