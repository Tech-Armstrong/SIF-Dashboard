name: Deploy to Azure Container Apps

# Push to main triggers a build+deploy. Path filters below (in each job)
# ensure only the app whose code changed gets rebuilt — or both, if both changed.
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

env:
  RESOURCE_GROUP: sif_dashboard
  # Backend
  ACR_API: sifdashbaordbackend            # note: "dashbaord" spelling matches the real ACR
  APP_API: sif-api
  # Frontend
  ACR_WEB: sifdashboardfrontend
  APP_WEB: sif-web
  # Frontend build-time API base (backend's stable public URL)
  API_BASE: https://sif-api.icyfield-2af9b5f5.centralindia.azurecontainerapps.io
  WEB_BASE: https://sif-web.icyfield-2af9b5f5.centralindia.azurecontainerapps.io

jobs:
  # ── Detect which parts of the repo changed ──────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'data/**'
            frontend:
              - 'frontend/**'

  # ── Backend: only runs if backend/ or data/ changed ─────────────────────
  deploy-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push backend image (in ACR)
        run: |
          az acr build -r "$ACR_API" -t "${APP_API}:${{ github.sha }}" -t "${APP_API}:latest" \
            -f backend/Dockerfile .

      - name: Deploy backend to Container App
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}
          INTERNAL_PASSWORD: ${{ secrets.INTERNAL_PASSWORD }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          az containerapp update -n "$APP_API" -g "$RESOURCE_GROUP" \
            --image "${ACR_API}.azurecr.io/${APP_API}:${{ github.sha }}" \
            --set-env-vars \
              "NEO4J_URI=${NEO4J_URI}" \
              "NEO4J_USERNAME=${NEO4J_USERNAME}" \
              "NEO4J_PASSWORD=${NEO4J_PASSWORD}" \
              "NEO4J_DATABASE=${NEO4J_DATABASE}" \
              "CORS_ORIGINS=${WEB_BASE}" \
              "INTERNAL_PASSWORD=${INTERNAL_PASSWORD}" \
              "INTERNAL_API_KEY=${INTERNAL_API_KEY}"

  # ── Frontend: only runs if frontend/ changed ────────────────────────────
  deploy-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push frontend image (in ACR)
        run: |
          az acr build -r "$ACR_WEB" -t "${APP_WEB}:${{ github.sha }}" -t "${APP_WEB}:latest" \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE="$API_BASE" \
            --build-arg NEXT_PUBLIC_INTERNAL_TOOLS_ENABLED=true \
            --build-arg NEXT_PUBLIC_INTERNAL_AUTH_ENABLED=true .

      - name: Deploy frontend to Container App
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          az containerapp update -n "$APP_WEB" -g "$RESOURCE_GROUP" \
            --image "${ACR_WEB}.azurecr.io/${APP_WEB}:${{ github.sha }}" \
            --set-env-vars "INTERNAL_API_KEY=${INTERNAL_API_KEY}"
